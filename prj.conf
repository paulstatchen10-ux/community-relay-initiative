# Zero-Knowledge Presence Relay - Kconfig
# nRF Connect SDK project configuration

# -----------------------------------------------------------------------
# Core Zephyr
# -----------------------------------------------------------------------
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=n

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# -----------------------------------------------------------------------
# Modem & LTE
# -----------------------------------------------------------------------
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y

# PSM Power Saving Mode
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00100001"
CONFIG_LTE_PSM_REQ_RAT="00000001"

# Prefer LTE-M; fallback to NB-IoT
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT=y
CONFIG_LTE_MODE_PREFERENCE_LTE_M=y

# eDRX (secondary power optimization)
CONFIG_LTE_EDRX_REQ=y

# -----------------------------------------------------------------------
# Networking Stack
# -----------------------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y

# DNS resolver
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_MAX_SERVERS=2

# -----------------------------------------------------------------------
# TLS / Security
# -----------------------------------------------------------------------
CONFIG_NET_SOCKETS_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y

# Modem-side TLS offload (modem handles TLS; more efficient on nRF9160)
CONFIG_MODEM_KEY_MGMT=y
CONFIG_NET_SOCKETS_OFFLOAD_TLS=y

# -----------------------------------------------------------------------
# HTTP Client
# -----------------------------------------------------------------------
CONFIG_HTTP_CLIENT=y

# -----------------------------------------------------------------------
# GPIO & Interrupts
# -----------------------------------------------------------------------
CONFIG_GPIO=y
CONFIG_GPIO_NRFX=y

# -----------------------------------------------------------------------
# TrustZone / Secure Partition Manager
# -----------------------------------------------------------------------
# SPM runs in SPE; this app runs in NSPE.
# SPM is built and flashed separately from the nRF Connect SDK
# as the "secure_partition_manager" sample.
#
# Alternatively, use TF-M (Trusted Firmware-M) for FIPS-aligned
# crypto isolation. Enable below for TF-M instead of SPM:
#
# CONFIG_BUILD_WITH_TFM=y
# CONFIG_TFM_PROFILE_TYPE_MINIMAL=y
#
# For initial development, SPM is simpler. Switch to TF-M for
# production deployments requiring formal security attestation.

# -----------------------------------------------------------------------
# Heap & Stack
# -----------------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# -----------------------------------------------------------------------
# Power Management
# -----------------------------------------------------------------------
CONFIG_PM=y
CONFIG_PM_DEVICE=y
# Deep sleep via modem PSM is managed by LTE LC library
# The nRF9160 application core idles in WFI between events

# -----------------------------------------------------------------------
# Disable unnecessary subsystems (minimize attack surface + power)
# -----------------------------------------------------------------------
CONFIG_UART_ASYNC_API=n
CONFIG_BT=n
CONFIG_IEEE802154=n
CONFIG_SHELL=n
CONFIG_CONSOLE_SUBSYS=n

# -----------------------------------------------------------------------
# Bootloader / DFU (optional - enable for OTA update capability)
# -----------------------------------------------------------------------
# CONFIG_BOOTLOADER_MCUBOOT=y
# CONFIG_IMG_MANAGER=y
